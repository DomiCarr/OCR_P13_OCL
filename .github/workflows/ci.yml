name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run flake8
      run: flake8 oc_lettings_site lettings profiles

    - name: Run pydocstyle
      run: pydocstyle oc_lettings_site lettings profiles

    - name: Run tests
      run: pytest

    - name: Run coverage
      run: pytest --cov=oc_lettings_site --cov=lettings --cov=profiles