# .github/workflows/ci.yml
# Workflow name displayed in the GitHub Actions tab
name: CI

# Events that trigger the CI pipeline
on:
  # Run CI on every push to the main branch
  push:
    branches: [ main ]

  # Run CI when a Pull Request targets main
  pull_request:
    branches: [ main ]

# Jobs executed by the pipeline
#----------------------------------
jobs:
#----------------------------------
  tests:
  #----------------------------------

    # Virtual machine used by GitHub Actions
    runs-on: ubuntu-latest

    steps:

    # Step 1: checkout the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: install the required Python version
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # Step 3: install project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: run code linting (PEP8 compliance)
    - name: Run flake8
      run: flake8 oc_lettings_site lettings profiles

    # Step 5: check docstrings style and presence
    - name: Run pydocstyle
      run: pydocstyle oc_lettings_site lettings profiles

    # Step 6: run unit and integration tests
    - name: Run tests
      run: pytest

    # Step 7: generate test coverage report
    - name: Run coverage
      run: pytest --cov=oc_lettings_site --cov=lettings --cov=profiles

    # Step 8: login to Docker Hub using GitHub secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # Step 9: setup Docker Buildx for multi-platform builds
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 10: build and push the Docker image for the VPS architecture
    - name: Build and push Docker image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: thedoms/oc-lettings:latest
        platforms: linux/amd64

  #----------------------------------
  deploy:
  #----------------------------------

    # Run deployment only after tests job succeeds
    needs: tests

    # Run deployment only on pushes to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Virtual machine used by GitHub Actions
    runs-on: ubuntu-latest

    steps:

    # Step 1: connect to the VPS and deploy the latest Docker image
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          docker pull thedoms/oc-lettings:latest
          docker rm -f oc-lettings || true
          docker run -d -p 8000:8000 --name oc-lettings --env-file .env -v /home/ubuntu/oc-lettings-site.sqlite3:/app/oc-lettings-site.sqlite3 thedoms/oc-lettings:latest
          docker exec oc-lettings python manage.py migrate